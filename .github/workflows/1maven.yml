      TEST_AWS_SECRET_ACCESS_KEY: "Kp9xQ2mV7aLs4Nz8Yw6Bc1Df3Gh5Jk0Rt2Uv9XeQ"
      TEST_GITHUB_TOKEN: "ghp_Q7x9Lm2Np4Rs6Tv8Wx1Yz3Ab5Cd7Ef9Gh2Jk"
      TEST_DATABASE_PASSWORD: "Vx9!Qm2#Lp7@Rs4$Nk8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
